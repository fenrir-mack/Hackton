<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibSense – Kanban</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0f13; color: #dde2ea; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* Topbar */
  #topbar {
    position: sticky; top: 0; z-index: 200;
    background: #0d0f13; border-bottom: 1px solid #1c2030;
    display: flex; align-items: center; padding: 0 24px; height: 54px;
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-right: 32px; }
  .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg,#f59e0b,#ef4444); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-weight: 800; font-size: 15px; }
  .logo-sub  { font-size: 9px; color: #4b5675; letter-spacing: 2px; }

  /* Tabs corrigidas para navegação real */
  .tabs { display: flex; gap: 5px; flex: 1; list-style: none; }
  .tabs li { display: inline-block; }
  .tab-link {
    text-decoration: none;
    color: #5a657a; font-size: 13px; font-weight: 500; padding: 8px 16px;
    border-radius: 7px; transition: 0.2s; border: 1px solid transparent;
    display: block;
  }
  .tab-link:hover { color: #9ba8be; background: #13161c; }
  .tab-link.active { color: #f59e0b; background: #1a1d26; border: 1px solid #252b3a; font-weight: 700; }

  .live-dot { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4b5675; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; }

  /* Legend */
  .tl-legend { display: flex; align-items: center; gap: 20px; padding: 12px 24px; background: #08090b; border-bottom: 1px solid #1c2030; font-size: 11px; color: #4b5675; flex-wrap: wrap; }
  .tl-item { display: flex; align-items: center; gap: 6px; }
  .tl-line { width: 28px; height: 2px; }

  .panel { padding: 24px; }
  .sec-title { font-size: 10px; color: #4b5675; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

  /* Kanban Board */
  .kb-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: start; }
  .kb-col { background: #13161c; border: 1px solid #1c2030; border-radius: 12px; min-height: 500px; display: flex; flex-direction: column; }
  .kb-col.drag-over { background: #1a1d26; border-color: #f59e0b; }
  .kb-col-header { padding: 16px; font-size: 12px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c2030; }
  .kb-count { background: #08090b; color: #4b5675; border-radius: 10px; padding: 2px 8px; font-size: 11px; }
  .kb-cards-container { padding: 12px; flex-grow: 1; min-height: 100px; }

  .kb-card { background: #08090b; border: 1px solid #1c2030; border-radius: 8px; padding: 14px; margin-bottom: 12px; cursor: grab; transition: 0.2s; }
  .kb-card:hover { border-color: #3b82f6; }
  .kb-card.dragging { opacity: 0.4; }

  .kb-machine { font-size: 10px; color: #4b5675; margin-bottom: 6px; font-family: monospace; }
  .kb-task { font-size: 13px; color: #dde2ea; font-weight: 600; margin-bottom: 12px; }
  .kb-meta { display: flex; justify-content: space-between; font-size: 11px; padding-top: 8px; border-top: 1px solid #1c2030; }
  .kb-due { color: #f59e0b; }

  @media(max-width:1000px) { .kb-board { grid-template-columns: repeat(2, 1fr); } }
  @media(max-width:600px) { .kb-board { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div><div class="logo-text">VibSense</div><div class="logo-sub">PREDICTIVE MAINTENANCE</div></div>
  </div>

  <ul class="tabs">
      <li><a href="{% url 'manutencao:visao_geral' %}" class="tab-link">Visão Geral</a></li>
      <li><a href="{% url 'manutencao:graficos' %}" class="tab-link">Gráficos</a></li>
      <li><a href="{% url 'manutencao:kanban' %}" class="tab-link active">Kanban</a></li>
      <li><a href="{% url 'manutencao:relatorio' %}" class="tab-link">Relatórios</a></li>
  </ul>

  <div class="live-dot"><div class="dot"></div><span>Dados até 20/01/2026</span></div>
</div>

<div class="tl-legend">
  <div class="tl-item"><div class="tl-line" style="background:#3b82f6;"></div><span>Vibração real</span></div>
  <div class="tl-item"><div class="tl-line" style="border-top:2px dashed #4b5675"></div><span>Projeção</span></div>
  <div class="tl-item"><div class="tl-line" style="background:#f59e0b;"></div><span>Corte: 20/01/26</span></div>
</div>

<div class="panel">
  <div class="sec-title">Gestão de Manutenção / Kanban</div>
  <div class="kb-board" id="kb-board">
    </div>
</div>

<script>
// Dados do Kanban
const COLUMNS = {
  urgente:      { label:"Urgente",      color:"#ef4444", icon:"🔴" },
  em_andamento: { label:"Em Andamento", color:"#f59e0b", icon:"🟡" },
  agendado:      { label:"Agendado",      color:"#3b82f6", icon:"🔵" },
  concluido:    { label:"Concluído",    color:"#22c55e", icon:"✅" },
};

let KB_DATA = {
  urgente:[
    { id: 1, machine:"Compressor Alpha", task:"Orçamento: rolamento", due:"Fev/26", who:"Carlos M." },
    { id: 2, machine:"Ventilador CV-07", task:"Orçamento: hélice", due:"Fev/26", who:"Ana R." },
  ],
  em_andamento:[
    { id: 3, machine:"Motor Bomba B2", task:"Fornecedores lubrificante", due:"Mar/26", who:"Pedro L." },
  ],
  agendado:[
    { id: 5, machine:"Compressor Alpha", task:"Peças (Prazo 20/04)", due:"Abr/26", who:"Carlos M." },
  ],
  concluido:[
    { id: 7, machine:"Prensa H-12", task:"Troca fluido hidráulico", due:"Jan/26", who:"Marcos F." },
  ],
};

function renderBoard() {
  const board = document.getElementById('kb-board');
  board.innerHTML = '';

  Object.keys(COLUMNS).forEach(colKey => {
    const colCfg = COLUMNS[colKey];
    const cards = KB_DATA[colKey] || [];

    const colEl = document.createElement('div');
    colEl.className = 'kb-col';
    colEl.innerHTML = `
      <div class="kb-col-header" style="color:${colCfg.color}">
        <span>${colCfg.icon} ${colCfg.label}</span>
        <span class="kb-count">${cards.length}</span>
      </div>
      <div class="kb-cards-container" data-status="${colKey}"></div>
    `;

    const container = colEl.querySelector('.kb-cards-container');

    cards.forEach(card => {
      const cardEl = document.createElement('div');
      cardEl.className = 'kb-card';
      cardEl.draggable = true;
      cardEl.innerHTML = `
        <div class="kb-machine">${card.machine}</div>
        <div class="kb-task">${card.task}</div>
        <div class="kb-meta">
          <span class="kb-who">${card.who}</span>
          <span class="kb-due">${card.due}</span>
        </div>
      `;

      cardEl.addEventListener('dragstart', () => {
        cardEl.classList.add('dragging');
        window.draggedCardId = card.id;
      });
      cardEl.addEventListener('dragend', () => cardEl.classList.remove('dragging'));

      container.appendChild(cardEl);
    });

    // Eventos de Drop
    colEl.addEventListener('dragover', e => {
      e.preventDefault();
      colEl.classList.add('drag-over');
    });
    colEl.addEventListener('dragleave', () => colEl.classList.remove('drag-over'));
    colEl.addEventListener('drop', e => {
      e.preventDefault();
      colEl.classList.remove('drag-over');
      moveCard(window.draggedCardId, colKey);
    });

    board.appendChild(colEl);
  });
}

function moveCard(cardId, newStatus) {
  let foundCard = null;
  Object.keys(KB_DATA).forEach(status => {
    const idx = KB_DATA[status].findIndex(c => c.id == cardId);
    if (idx > -1) foundCard = KB_DATA[status].splice(idx, 1)[0];
  });
  if (foundCard) {
    KB_DATA[newStatus].push(foundCard);
    renderBoard();
  }
}

renderBoard();
</script>
</body>
</html>
